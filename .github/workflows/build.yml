name: Final Build FTO
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build
        run: |
          npm install
          # ใช้ webpack มัดรวมทุกอย่างเป็นไฟล์เดียวที่เบราว์เซอร์อ่านออก
          npx webpack --mode production
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: jemie-final-script
          path: dist/index.js
