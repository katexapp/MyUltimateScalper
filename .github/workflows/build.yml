name: Final Build FTO
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build
        run: |
          npm install
          # สั่ง build แบบไม่สน error จุกจิก และให้มันสร้างไฟล์ออกมา
          npx webpack --mode production || npx tsc src/index.ts --outDir dist
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: jemie-final-script
          # ค้นหาไฟล์ index.js ทุกที่ในโปรเจกต์มาให้เกตุเลือก
          path: "**/index.js" 
          if-no-files-found: warn
